name: Continuous Core Auto Sync Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Repository Code
      uses: actions/checkout@v3

    - name: Set up Python Environment Configuration
      uses: actions/setup-python@v4
      with:
        python-cache-dependency-path: |
          requirements.txt
        python-version: '3.10'

    - name: Install Critical Network Dependencies
      run: |
        sudo apt-get update
        # 🟢 اصلاح شد: ابزار killall داخل پکیج psmisc قرار دارد
        sudo apt-get install -y psmisc wget curl jq unzip
        pip install requests

    - name: Install and Setup Xray Core System
      run: |
        bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install
        sudo mkdir -p /usr/local/etc/xray
        sudo chmod 777 /usr/local/etc/xray

    - name: Install and Initialize Cloudflare Tunnel Engine
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        
        # استارت تانل ابری و استخراج آدرس روتینگ موقت بدون قطعی
        sudo nohup cloudflared tunnel --url http://127.0.0.1:8085 --edge-ip-version 4 --protocol http2 > cloudflare.log 2>&1 &
        sleep 8
        
        # استخراج آدرس زنده اج تانل
        grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" cloudflare.log | head -n 1 > active_edge_host.txt
        echo "=================================================="
        echo "🌐 CONNECT TO BACKEND EDGE HUB AT:"
        cat active_edge_host.txt
        echo "=================================================="

    - name: Launch Operational Backend Microservice
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # اجرای بک‌اند پایتون و مانیتورینگ زنده ترافیک شبکه کلاینت‌ها
        python3 analytics_worker.py &
        
        # چرخه انتظار به مدت ۵.۵ ساعت قبل از تمدید مجدد اکشنز
        sleep 19500
        
        # راه‌اندازی زنجیره‌ای مجدد و خودکار بدون باگ نام فایل
        echo "🔄 تمدید ایمن زنجیره سرور برای جلوگیری از قطع شدن اتصالات..."
        curl -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/data-sync.yml/dispatches \
          -d '{"ref":"main"}'
        
        echo "✅ ران بعدی استارت شد. رانر فعلی با حفظ دیتابیس ریست می‌شود."
